services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salvacao_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salvacao_password}
      POSTGRES_DB: ${POSTGRES_DB:-projeto_salvacao}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salvacao_user} -d ${POSTGRES_DB:-projeto_salvacao}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
