version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: salvacao_user
      POSTGRES_PASSWORD: salvacao_password
      POSTGRES_DB: projeto_salvacao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salvacao_user -d projeto_salvacao"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
